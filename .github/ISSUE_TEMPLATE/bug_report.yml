name: Bug report
description: Something in lore isn't working as expected
labels: ["bug", "triage"]
body:
  - type: input
    id: version
    attributes:
      label: lore version
      description: Output of `lore --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.0"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI (lore learn, lore search, etc.)
        - MCP server (lore serve)
        - Compiler (lore compile)
        - Storage / JSONL
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Be specific. Include the exact command you ran.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      render: shell
