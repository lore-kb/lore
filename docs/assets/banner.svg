<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" role="img" aria-label="lore — your knowledge base has a compiler">
  <title>lore</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="100%" stop-color="#1a1f3d"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="340" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="85" x2="1280" y2="85"/>
    <line x1="0" y1="255" x2="1280" y2="255"/>
  </g>

  <!-- Title -->
  <text x="80" y="130" font-family="Inter, SF Pro Display, system-ui, sans-serif" font-weight="800" font-size="82" fill="#ffffff" letter-spacing="-2">lore</text>

  <!-- Accent line -->
  <rect x="80" y="148" width="80" height="4" fill="url(#glow)" rx="2"/>

  <!-- Tagline -->
  <text x="80" y="195" font-family="Inter, SF Pro Text, system-ui, sans-serif" font-weight="400" font-size="26" fill="#d1d5f0">Your knowledge base has a compiler.</text>

  <!-- Subtitle -->
  <text x="80" y="232" font-family="Inter, SF Pro Text, system-ui, sans-serif" font-weight="400" font-size="17" fill="#8b90b5">Auto-capture facts and decisions from AI coding sessions.</text>
  <text x="80" y="256" font-family="Inter, SF Pro Text, system-ui, sans-serif" font-weight="400" font-size="17" fill="#8b90b5">Compile into a searchable knowledge base. Local-first. Open source.</text>

  <!-- Pillars -->
  <g transform="translate(80, 302)" font-family="Inter, SF Mono, ui-monospace, monospace" font-size="12" font-weight="700" letter-spacing="2.5">
    <text x="0" y="0" fill="#ffffff">AUTO-CAPTURE</text>
    <circle cx="120" cy="-4" r="2" fill="#6c5ce7"/>
    <text x="133" y="0" fill="#ffffff">DECISION TRACES</text>
    <circle cx="295" cy="-4" r="2" fill="#6c5ce7"/>
    <text x="308" y="0" fill="#ffffff">LLM COMPILER</text>
    <circle cx="432" cy="-4" r="2" fill="#6c5ce7"/>
    <text x="445" y="0" fill="#ffffff">STALE DETECTION</text>
  </g>

  <!-- Right side: terminal mock -->
  <g transform="translate(780, 50)" opacity="0.9">
    <rect x="0" y="0" width="420" height="240" rx="12" fill="#141830" stroke="#2a2f55" stroke-width="1"/>
    <rect x="0" y="0" width="420" height="28" rx="12" fill="#1e2345"/>
    <rect x="0" y="18" width="420" height="10" fill="#1e2345"/>
    <circle cx="16" cy="14" r="5" fill="#ff5f57"/>
    <circle cx="32" cy="14" r="5" fill="#febc2e"/>
    <circle cx="48" cy="14" r="5" fill="#28c840"/>

    <g font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="13">
      <text x="22" y="58" fill="#8b90b5">$</text>
      <text x="36" y="58" fill="#a29bfe">lore learn</text>
      <text x="122" y="58" fill="#d1d5f0">"shadow DOM needed for iframes"</text>

      <text x="22" y="80" fill="#28c840">✓ learning captured</text>
      <text x="190" y="80" fill="#8b90b5">(myapp: 23 entries)</text>

      <text x="22" y="110" fill="#8b90b5">$</text>
      <text x="36" y="110" fill="#a29bfe">lore search</text>
      <text x="130" y="110" fill="#d1d5f0">"iframe"</text>

      <text x="22" y="132" fill="#6c5ce7">LEARNING</text>
      <text x="100" y="132" fill="#d1d5f0">shadow DOM needed for iframes</text>
      <text x="22" y="150" fill="#8b90b5">           myapp | 2026-03-28</text>

      <text x="22" y="180" fill="#8b90b5">$</text>
      <text x="36" y="180" fill="#a29bfe">lore compile</text>
      <text x="140" y="180" fill="#d1d5f0">myapp</text>

      <text x="22" y="202" fill="#28c840">✓ Written:</text>
      <text x="100" y="202" fill="#d1d5f0">~/.lore/compiled/myapp.md</text>
      <text x="22" y="220" fill="#8b90b5">  142 lines, 47 entries compiled</text>
    </g>
  </g>
</svg>
