<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img">
  <title>lore</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="100%" stop-color="#1a1f3d"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Stylized book/page shape (knowledge) -->
  <g transform="translate(256,240)">
    <!-- Left page -->
    <path d="M-10,60 L-10,-70 Q-10,-90 -30,-90 L-100,-90 Q-110,-90 -110,-80 L-110,50 Q-110,60 -100,60 Z"
          fill="none" stroke="#a29bfe" stroke-width="6" opacity="0.6"/>
    <!-- Right page -->
    <path d="M10,60 L10,-70 Q10,-90 30,-90 L100,-90 Q110,-90 110,-80 L110,50 Q110,60 100,60 Z"
          fill="none" stroke="#a29bfe" stroke-width="6" opacity="0.6"/>
    <!-- Spine -->
    <line x1="0" y1="-85" x2="0" y2="60" stroke="#6c5ce7" stroke-width="4"/>

    <!-- Lines on pages (knowledge entries) -->
    <g stroke="#6c5ce7" stroke-width="3" opacity="0.5">
      <line x1="-90" y1="-60" x2="-25" y2="-60"/>
      <line x1="-90" y1="-40" x2="-35" y2="-40"/>
      <line x1="-90" y1="-20" x2="-25" y2="-20"/>
      <line x1="-90" y1="0" x2="-45" y2="0"/>
      <line x1="25" y1="-60" x2="90" y2="-60"/>
      <line x1="35" y1="-40" x2="90" y2="-40"/>
      <line x1="25" y1="-20" x2="90" y2="-20"/>
      <line x1="30" y1="0" x2="90" y2="0"/>
    </g>

    <!-- Compile arrow (the compiler concept) -->
    <path d="M0,75 L0,105" stroke="url(#glow)" stroke-width="5" stroke-linecap="round"/>
    <polygon points="0,118 -10,102 10,102" fill="url(#glow)"/>
  </g>

  <!-- Compiled output dot -->
  <circle cx="256" cy="385" r="14" fill="url(#glow)" opacity="0.9"/>
  <circle cx="256" cy="385" r="7" fill="#0c1222"/>

  <!-- "lore" text -->
  <text x="256" y="445" text-anchor="middle"
        font-family="Inter, SF Pro Display, system-ui, sans-serif"
        font-weight="800" font-size="52" fill="#ffffff" letter-spacing="-1">lore</text>
</svg>
